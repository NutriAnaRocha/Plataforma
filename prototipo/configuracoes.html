<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-brand-title>Configurações</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
  <link rel="stylesheet" href="assets/css/configuracoes.css" />
</head>
<body>
  <div class="app" id="app">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">
      <div class="sidebar__logo">
        <span class="sidebar__mark"><img src="assets/img/logo-mark.png" alt="" /></span>
        <span class="sidebar__word" data-brand>NutriPlat</span>
      </div>

      <nav class="menu" aria-label="Menu principal">
        <a href="dashboard.html"><span class="ico">📊</span> Dashboard</a>
        <a href="pacientes.html"><span class="ico">👥</span> Pacientes</a>
        <a href="agenda.html"><span class="ico">📅</span> Agenda <span class="badge">7</span></a>
        <a href="prontuario.html"><span class="ico">📋</span> Prontuários</a>
        <a href="prescricoes.html"><span class="ico">🥗</span> Prescrições</a>
        <a href="exames.html"><span class="ico">🧪</span> Exames</a>

        <p class="menu__label">Gestão</p>
        <a href="comunidade.html"><span class="ico">💬</span> Comunidade</a>
        <a href="financeiro.html"><span class="ico">💰</span> Financeiro</a>
        <a href="relatorios.html"><span class="ico">📈</span> Relatórios</a>

        <p class="menu__label">Sistema</p>
        <a href="ia.html"><span class="ico">🤖</span> IA Assistente</a>
        <a href="configuracoes.html" class="is-active"><span class="ico">⚙️</span> Configurações</a>
      </nav>

      <div class="sidebar__user">
        <span class="avatar avatar--sm avatar--rosa">AL</span>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">Ana Luísa</div>
          <div class="sidebar__user-crn">CRN-3 12345</div>
        </div>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- ================= CONTEÚDO ================= -->
    <div class="content">

      <!-- Topbar -->
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menu-toggle" type="button" aria-label="Abrir menu">☰</button>
        <div class="topbar__hello">
          <h1>Configurações</h1>
          <p>Gerencie seu perfil, conta e integrações</p>
        </div>
        <span class="avatar" id="user-avatar" style="margin-left:auto">AL</span>
      </header>

      <!-- Canvas -->
      <main class="canvas">
        <div class="cfg-grid">

          <!-- Abas -->
          <nav class="cfg-tabs" id="cfg-tabs" aria-label="Seções de configuração">
            <button class="cfg-tab is-active" data-tab="perfil" type="button"><span class="cfg-tab__ico">👤</span> Perfil</button>
            <button class="cfg-tab" data-tab="conta" type="button"><span class="cfg-tab__ico">🔐</span> Conta &amp; Segurança</button>
            <button class="cfg-tab" data-tab="notif" type="button"><span class="cfg-tab__ico">🔔</span> Notificações</button>
            <button class="cfg-tab" data-tab="integr" type="button"><span class="cfg-tab__ico">🔌</span> Integrações</button>
          </nav>

          <!-- Painéis -->
          <div class="cfg-panels">
            <section class="cfg-panel is-active" data-panel="perfil" id="panel-perfil"></section>
            <section class="cfg-panel" data-panel="conta" id="panel-conta"></section>
            <section class="cfg-panel" data-panel="notif" id="panel-notif"></section>
            <section class="cfg-panel" data-panel="integr" id="panel-integr"></section>
          </div>

        </div>
      </main>
    </div>
  </div>

  <!-- Toast de salvamento -->
  <div class="cfg-toast" id="cfg-toast" role="status" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="assets/js/configuracoes-data.js"></script>
  <script src="assets/js/configuracoes.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
