<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-brand-title>Artigo · Feed Científico</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    /* ---- Página do artigo (leitura do Feed Científico) ---- */
    .article-page {
      min-height: 100vh;
      background: var(--rosa-suave);
      padding: var(--sp-5) var(--sp-4) var(--sp-8);
    }
    .article-wrap { max-width: 760px; margin: 0 auto; }

    .article-back {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      background: none; border: none; cursor: pointer;
      color: var(--vinho); font-family: var(--font-ui); font-weight: 600;
      font-size: var(--fs-sm); padding: var(--sp-2) 0; margin-bottom: var(--sp-4);
    }
    .article-back:hover { color: var(--vinho-escuro); text-decoration: underline; }

    .article {
      background: var(--branco);
      border: 1px solid var(--cinza-borda);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
      padding: clamp(var(--sp-5), 5vw, var(--sp-7));
    }

    .article__top {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--sp-3);
      margin-bottom: var(--sp-4);
    }
    .article__tag {
      background: var(--rosa); color: var(--vinho);
      font-size: var(--fs-caption); font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; padding: 4px 12px; border-radius: var(--radius-chip);
    }
    .article__date { color: var(--texto-sutil); font-size: var(--fs-sm); }

    .article__title {
      font-family: var(--font-ui); font-weight: 800; color: var(--vinho);
      font-size: clamp(1.5rem, 3.4vw, 2.1rem); line-height: var(--lh-tight);
      margin-bottom: var(--sp-4);
    }

    .article__evid {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      font-size: var(--fs-sm); color: var(--texto-sutil);
      margin-bottom: var(--sp-5);
    }
    .article__evid .stars { position: relative; display: inline-block; font-size: 1rem; letter-spacing: 1px; }
    .article__evid .stars__off { color: var(--cinza-borda); }
    .article__evid .stars__on { position: absolute; left: 0; top: 0; color: #E7B10A; overflow: hidden; white-space: nowrap; }

    .article__lead {
      font-size: 1.1rem; line-height: var(--lh-normal); color: var(--texto);
      padding: var(--sp-4); background: var(--cinza-claro);
      border-radius: var(--radius-sm); margin-bottom: var(--sp-5);
    }

    .article__block { margin-bottom: var(--sp-5); }
    .article__block h2 {
      display: flex; align-items: center; gap: var(--sp-2);
      font-family: var(--font-ui); font-weight: 700; color: var(--vinho);
      font-size: var(--fs-h3); margin-bottom: var(--sp-2);
    }
    .article__block p { line-height: var(--lh-normal); color: var(--texto); font-size: var(--fs-body); }

    .article__source {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      margin-top: var(--sp-3); padding: var(--sp-3) var(--sp-5);
      background: var(--vinho); color: var(--branco);
      border-radius: var(--radius-btn); font-weight: 600; font-size: var(--fs-sm);
      text-decoration: none; transition: background var(--t-fast);
    }
    .article__source:hover { background: var(--vinho-escuro); }

    .article__soon {
      margin-top: var(--sp-4); padding: var(--sp-4);
      border: 1px dashed var(--cinza-borda); border-radius: var(--radius-sm);
      color: var(--texto-sutil); font-size: var(--fs-sm); text-align: center;
    }

    .article__foot {
      margin-top: var(--sp-6); padding-top: var(--sp-4);
      border-top: 1px solid var(--cinza-borda);
      color: var(--texto-sutil); font-size: var(--fs-caption);
    }

    .article-missing {
      text-align: center; padding: var(--sp-8) var(--sp-4); color: var(--texto-sutil);
    }
    .article-missing h1 { color: var(--vinho); font-family: var(--font-ui); margin-bottom: var(--sp-3); }
  </style>
</head>
<body>
  <main class="article-page">
    <div class="article-wrap">
      <button class="article-back" id="article-back" type="button">← Voltar ao feed</button>
      <div id="article-root"></div>
    </div>
  </main>

  <script src="assets/js/feed-data.js"></script>
  <script>
    (function () {
      "use strict";

      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }

      function stars(n) {
        var on = "", off = "";
        for (var i = 0; i < 5; i++) { (i < n ? (on += "★") : (off += "★")); }
        return '<span class="stars"><span class="stars__on">' + on +
               '</span><span class="stars__off">' + off + '</span></span>';
      }

      // O botão "voltar" retorna à página anterior (feed) ou, se aberto direto, à home.
      document.getElementById("article-back").addEventListener("click", function () {
        if (document.referrer && history.length > 1) { history.back(); }
        else { window.location.href = "index.html"; }
      });

      var data = (window.FEED_DATA && window.FEED_DATA.cards) || [];
      var id = new URLSearchParams(location.search).get("id");
      var card = data.filter(function (c) { return c.id === id; })[0];

      var root = document.getElementById("article-root");

      if (!card) {
        root.innerHTML =
          '<div class="article-missing">' +
            '<h1>Artigo não encontrado</h1>' +
            '<p>Este conteúdo pode ter sido movido. Volte ao feed para ver as atualizações mais recentes.</p>' +
          '</div>';
        return;
      }

      document.title = card.title + " · Feed Científico";

      // Fonte externa real só quando o link não é vazio nem "#".
      var link = (card.link || "").trim();
      var hasSource = !!link && link !== "#";

      var sourceHTML = hasSource
        ? '<a class="article__source" href="' + esc(link) + '" target="_blank" rel="noopener">📚 Ler o estudo original →</a>'
        : '<div class="article__soon">📄 O estudo original completo será disponibilizado em breve. ' +
          'Abaixo está o resumo científico traduzido e comentado pela nossa curadoria.</div>';

      root.innerHTML =
        '<article class="article">' +
          '<div class="article__top">' +
            '<span class="article__tag">' + esc(card.categoria) + '</span>' +
            '<span class="article__date">' + esc(card.data) + '</span>' +
          '</div>' +
          '<h1 class="article__title">' + esc(card.title) + '</h1>' +
          '<div class="article__evid">Nível de evidência ' + stars(card.evidencia) + '</div>' +

          '<p class="article__lead"><strong>Resumo em 30s:</strong> ' + esc(card.resumo) + '</p>' +

          '<div class="article__block">' +
            '<h2>🧠 O que mudou na prática clínica?</h2>' +
            '<p>' + esc(card.mudou) + '</p>' +
          '</div>' +

          '<div class="article__block">' +
            '<h2>💡 Como aplicar com seus pacientes?</h2>' +
            '<p>' + esc(card.aplicar) + '</p>' +
          '</div>' +

          sourceHTML +

          '<p class="article__foot">Feed Científico Inteligente · Resumo curado para nutricionistas. ' +
          'Sempre avalie o contexto clínico individual de cada paciente.</p>' +
        '</article>';
    })();
  </script>
</body>
</html>
