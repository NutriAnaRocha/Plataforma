<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-brand-title>Minha Biblioteca</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/portal.css" />

  <style>
    .biblio-wrap { max-width: var(--maxw, 1100px); margin: 0 auto; padding: var(--sp-5) var(--sp-4) var(--sp-8); }
    .biblio-hero { margin: var(--sp-5) 0 var(--sp-6); }
    .biblio-hero h1 { font-family: var(--font-display); font-weight: 900; color: var(--vinho); font-size: var(--fs-h1); margin: 0 0 .3em; }
    .biblio-hero p { color: var(--texto-sutil); margin: 0; max-width: 52ch; }

    .biblio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: var(--sp-5); }
    .biblio-card { background: var(--branco); border: 1px solid var(--cinza-borda); border-radius: var(--radius-card, 16px);
      overflow: hidden; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; transition: box-shadow var(--t-fast), transform var(--t-fast); }
    .biblio-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .biblio-cover-wrap { position: relative; aspect-ratio: 3 / 4; overflow: hidden; }
    .biblio-cover { width: 100%; height: 100%; object-fit: cover; display: block; }
    .biblio-cover--ph { display: flex; align-items: center; justify-content: center; text-align: center;
      padding: var(--sp-4); font-family: var(--font-display); font-weight: 900; color: var(--branco);
      background: linear-gradient(150deg, var(--vinho), var(--rosa)); font-size: 1.05rem; line-height: 1.25; }
    .is-locked .biblio-cover { filter: grayscale(.5) brightness(.9); }

    .biblio-badge { position: absolute; top: 10px; left: 10px; font-size: .72rem; font-weight: 700;
      padding: .25em .7em; border-radius: var(--radius-chip, 999px); color: var(--branco); letter-spacing: .02em; }
    .biblio-badge--free { background: #217a49; }
    .biblio-badge--own { background: var(--vinho); }

    .biblio-body { padding: var(--sp-4); display: flex; flex-direction: column; gap: .5rem; flex: 1; }
    .biblio-body h3 { font-size: 1.02rem; color: var(--texto); margin: 0; line-height: 1.3; }
    .biblio-body p { font-size: .88rem; color: var(--texto-sutil); margin: 0; flex: 1; }
    .biblio-foot { margin-top: var(--sp-3); display: flex; flex-direction: column; gap: .5rem; }

    .biblio-empty, #biblio-loading { color: var(--texto-sutil); text-align: center; padding: var(--sp-7) 0; }

    /* Seções por categoria */
    .biblio-section { margin-bottom: var(--sp-7); }
    .biblio-cat { font-family: var(--font-display); font-weight: 900; color: var(--vinho); font-size: var(--fs-h2);
      margin: 0 0 var(--sp-4); padding-bottom: .5rem; border-bottom: 1px solid var(--cinza-borda); }

    /* Leitor em tela cheia */
    .biblio-reader { position: fixed; inset: 0; z-index: 60; background: var(--branco); display: flex; flex-direction: column; }
    /* O atributo [hidden] precisa vencer o display:flex acima (senão o leitor
       fica SEMPRE por cima, cobrindo a biblioteca inteira em branco). */
    .biblio-reader[hidden] { display: none; }
    .biblio-reader__bar { display: flex; align-items: center; gap: var(--sp-3); padding: .6rem var(--sp-4);
      border-bottom: 1px solid var(--cinza-borda); background: var(--branco); }
    .biblio-reader__bar strong { font-family: var(--font-display); font-weight: 900; color: var(--vinho); font-size: 1rem;
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .biblio-reader__close { border: 1px solid var(--cinza-borda); background: var(--branco); border-radius: var(--radius-btn, 10px);
      padding: .45rem .9rem; font-weight: 600; cursor: pointer; color: var(--texto); }
    .biblio-reader__close:hover { background: var(--cinza-claro); }
    #biblio-frame { flex: 1; width: 100%; border: 0; }

    @media (max-width: 520px) {
      .biblio-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: var(--sp-4); }
      .biblio-hero h1 { font-size: var(--fs-h2); }
    }
  </style>
</head>
<body class="portal-body">

  <!-- Cabeçalho -->
  <header class="portal-head">
    <a class="portal-head__brand" href="dashboard.html" style="text-decoration:none">
      <span class="portal-head__mark"><img src="assets/img/logo-mark.png" alt="" /></span>
      <span data-brand>NutriPlat</span>
    </a>
    <div class="portal-head__right">
      <span class="portal-head__hi" id="biblio-hi">Olá</span>
      <button class="icon-btn" type="button" title="Sair" aria-label="Sair" data-logout>↩</button>
    </div>
  </header>

  <div class="biblio-wrap">
    <section class="biblio-hero">
      <h1>Minha Biblioteca</h1>
      <p>Seus e-books e materiais interativos, para ler quando quiser. O que você adquiriu fica sempre disponível aqui.</p>
    </section>

    <p id="biblio-loading">Carregando sua biblioteca…</p>
    <div id="biblio-catalogo"></div>
  </div>

  <!-- Leitor em tela cheia -->
  <div class="biblio-reader" id="biblio-reader" hidden>
    <div class="biblio-reader__bar">
      <strong id="biblio-reader-title">E-book</strong>
      <button class="biblio-reader__close" type="button" data-fechar-leitor>✕ Fechar</button>
    </div>
    <iframe id="biblio-frame" title="Leitor de e-book"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups" src="about:blank"></iframe>
  </div>

  <!-- Scripts -->
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/biblioteca.js"></script>
</body>
</html>
