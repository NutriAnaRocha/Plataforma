<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-brand-title>Comunidade</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
  <link rel="stylesheet" href="assets/css/comunidade.css" />
</head>
<body>
  <div class="app" id="app">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">
      <div class="sidebar__logo">
        <span class="sidebar__mark"><img src="assets/img/logo-mark.png" alt="" /></span>
        <span class="sidebar__word" data-brand>NutriPlat</span>
      </div>

      <nav class="menu" aria-label="Menu principal">
        <a href="dashboard.html"><span class="ico">📊</span> Dashboard</a>
        <a href="pacientes.html"><span class="ico">👥</span> Pacientes</a>
        <a href="agenda.html"><span class="ico">📅</span> Agenda <span class="badge">7</span></a>
        <a href="prontuario.html"><span class="ico">📋</span> Prontuários</a>
        <a href="prescricoes.html"><span class="ico">🥗</span> Prescrições</a>
        <a href="exames.html"><span class="ico">🧪</span> Exames</a>

        <p class="menu__label">Gestão</p>
        <a href="comunidade.html" class="is-active"><span class="ico">💬</span> Comunidade</a>
        <a href="financeiro.html"><span class="ico">💰</span> Financeiro</a>
        <a href="relatorios.html"><span class="ico">📈</span> Relatórios</a>

        <p class="menu__label">Sistema</p>
        <a href="ia.html"><span class="ico">🤖</span> IA Assistente</a>
        <a href="configuracoes.html"><span class="ico">⚙️</span> Configurações</a>
      </nav>

      <div class="sidebar__user">
        <span class="avatar avatar--sm avatar--rosa">AL</span>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">Ana Luísa</div>
          <div class="sidebar__user-crn">CRN-3 12345</div>
        </div>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- ================= CONTEÚDO ================= -->
    <div class="content">

      <!-- Topbar -->
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menu-toggle" type="button" aria-label="Abrir menu">☰</button>
        <div class="topbar__hello">
          <h1>Comunidade</h1>
          <p>Rede profissional de nutricionistas</p>
        </div>
        <button class="btn btn--primary" type="button" id="btn-novo-post" style="margin-left:auto">✏️ Publicar</button>
        <span class="avatar" id="user-avatar">AL</span>
      </header>

      <!-- Canvas -->
      <main class="canvas">
        <div class="com-grid">

          <!-- Coluna do feed -->
          <div class="com-feed">

            <!-- Compositor -->
            <section class="card composer" id="composer">
              <div class="composer__row">
                <span class="avatar avatar--rosa">AL</span>
                <button class="composer__fake" type="button" id="composer-open">
                  Compartilhe um caso, dúvida ou conquista…
                </button>
              </div>
              <form class="composer__box" id="composer-box" hidden>
                <textarea class="composer__text" id="composer-text" rows="3"
                  placeholder="No que você está pensando? (não inclua dados que identifiquem pacientes)"></textarea>
                <div class="composer__foot">
                  <label class="composer__cat">
                    Categoria
                    <select id="composer-cat"></select>
                  </label>
                  <div class="composer__actions">
                    <button class="btn btn--outline" type="button" id="composer-cancel">Cancelar</button>
                    <button class="btn btn--primary" type="submit">Publicar</button>
                  </div>
                </div>
              </form>
            </section>

            <!-- Filtros -->
            <div class="chips com-chips" id="com-chips" role="tablist" aria-label="Filtrar por categoria"></div>

            <!-- Lista de posts -->
            <section class="posts" id="posts" aria-live="polite"></section>
          </div>

          <!-- Coluna lateral -->
          <aside class="com-side">
            <section class="card side-hero" id="side-hero"></section>

            <section class="card">
              <div class="card__head"><h2 class="card__title">Em alta 🔥</h2></div>
              <div class="card__body side-tags" id="side-tags"></div>
            </section>

            <section class="card">
              <div class="card__head"><h2 class="card__title">Sugestões para seguir</h2></div>
              <div class="card__body side-people" id="side-people"></div>
            </section>
          </aside>

        </div>
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/js/comunidade-data.js"></script>
  <script src="assets/js/comunidade.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
